server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    # Matches the exact path inside both containers via podman volumes
    root /home/clp-user/htdocs/public;
    index index.php index.html index.htm;

    # Logging profiles
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # Global site configuration
    charset utf-8;
    client_max_body_size 100M;

    # Handle standard front-controller routing (Laravel, WordPress, Symfony, etc.)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Block direct browser access to hidden files (like .env or .git)
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Pass all PHP scripts directly to the PHP-FPM container over TCP
    location ~ \.php$ {
        try_files $uri =404;

        include fastcgi_params;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        
        # --- CHANGE THIS LINE ---
        # "php" matches the service name defined in your compose file
        fastcgi_pass php:9000;

        # Tuning parameters
        fastcgi_read_timeout 600;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
    }

    # Optimize static asset delivery (Browser Caching)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
        log_not_found off;
    }
}